<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tip-Calculator</title>
</head>

<body>
    <header>
        <h1>
            Dice Roll Simulator
        </h1>
    </header>
    <main>
        <div id="dice-container">
            <span id="cube">
                <span id="dot" class="dot1"></span>
                <span id="dot" class="dot2"></span>
                <span id="dot" class="dot3"></span>
                <span id="dot" class="dot4"></span>
                <span id="dot" class="dot5"></span>
                <span id="dot" class="dot6"></span>
                <span id="dot" class="dot7"></span>
                <span id="dot" class="dot8"></span>
                <span id="dot" class="dot9"></span>
            </span>
            <h1 class="Textshow">2</h1>
        </div>
        <div id="button-container">
            <button id="roll-button">Roll Dice</button>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
