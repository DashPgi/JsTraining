<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Social Media Selector</title>
</head>

<body>
    <main>
        <h2 id="notif"></h2>
        <div class="framebase">
            <iframe id="showurlcontent" frameborder="0">Click Any Media you want</iframe>
        </div>

        <div class="listbase">
            <button class="openclosebtn">SocialMedia</button>
<ul class="Social-media-List">
    <li id="website" value="https://pggrowth.ir" class="Media">
        <i class="fa-solid fa-globe" style="color: rgb(255, 255, 255);"></i> Website
    </li>

    <li id="Discord" value="https://discord.gg/zGjbteSSuu" class="Media">
        <i class="fa-brands fa-discord" style="color:  rgb(77, 77, 166);"></i> Discord
    </li>

    <li id="Telegram" value="https://t.me/PgiSample" class="Media">
        <i class="fa-brands fa-telegram" style="color: rgb(30, 184, 255);"></i> Telegram
    </li>

    <li id="Instagram" value="https://www.instagram.com/dashpgi/" class="Media">
        <i class="fa-brands fa-instagram" style="color: rgb(213, 5, 255);"></i> Instagram
    </li>
</ul>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
