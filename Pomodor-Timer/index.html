<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pomodoro Timer</title>
</head>

<body>
    <header>
        <h1>
            Pomodoro Timer
        </h1>
    </header>
    <main>
        <div class="timer">
            <h1 id="Pomodoro">00:00</h1>
        </div>
        <input type="time" id="timeinput">
        <div class="control-base">

            <button id="start-btn" class="cbtn">Start</button>
            <button id="stop-btn" class="cbtn">Stop</button>
            <button id="reset-btn" class="cbtn">Reset</button>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
