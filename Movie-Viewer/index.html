<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Movie Viewer</title>
</head>

<body>
    <header>
        <h1>
            Movie Viewer
        </h1>
    </header>
    <main>
        <div class="videoprojector">
            <span id="closebtn" class="close">&times;</span>
            <iframe class="videoframe" src="" frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        <div class="input">
            <input type="text" id="urlinput" placeholder="Enter Your Url Video">
            <button id="VideoLoader">Load</button>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
