<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
    <h1 id="headtext">Temperature Converter</h1>

    <div class="container">
        <p>Celsius :</p>
        <input
            type="number"
            id="celsius-input"
            placeholder="Enter Celsius"
            oninput="convertTemperature('celsius')"
        >

        <p>Fahrenheit :</p>
        <input
            type="number"
            id="fahrenheit-input"
            placeholder="Enter Fahrenheit"  
            oninput="convertTemperature('fahrenheit')"
        >

        <p>Kelvin :</p>
        <input
            type="number"
            id="kelvin-input"
            placeholder="Enter Kelvin"
            oninput="convertTemperature('kelvin')"
        >
    </div>
</main>

<script src="app.js"></script>

</body>
</html>
