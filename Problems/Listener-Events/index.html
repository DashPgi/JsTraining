<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>AddeventListener()</title>
</head>

<body>
    <main>
        <h1>Mouse Events</h1>
        <div class="mousevent">
            <button class="btn" id="clickbtn">Click</button>
            <button class="btn" id="dblclickbtn">Double Click</button>
            <button class="btn" id="mousedownbtn">Mousedown</button>
            <button class="btn" id="mouseupbtn">Mouseup</button>
            <button class="btn" id="mousemovebtn">Mousemove</button>
            <button class="btn" id="mouseenterbtn">Mouseenter</button>
            <button class="btn" id="mouseleavebtn">Mouseleave</button>
            <button class="btn" id="mouseoverbtn">Mouseover<span style="width: 20px;height: 20px;background: var(--Blue-color);display: block;position: absolute;transform: translate(-150%,-100%);"></span></button>
            <button class="btn" id="mouseoutbtn">Mouseout<span style="width: 20px;height: 20px;background: var(--Blue-color);display: block;position: absolute;transform: translate(-150%,-100%);"></span></button>
            <button class="btn" id="contextmenubtn">Righlick<span class="rightclickchild" style="width: 20px;height: 20px;background: var(--Blue-color);display: none;position: absolute;transform: translate(-150%,-100%);"></span></button>
        </div>
        <h1>Keyboard Events</h1>
        <div class="kyeevent">
            <button class="btn" id="keydownbtn">keydown</button>
            <button class="btn" id="keyupbtn">keyup</button>
        </div>
    </main> 
</body>
<script src="app.js"></script>

</html>
